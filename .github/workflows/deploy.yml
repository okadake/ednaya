name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [microcms_update]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  fetch-notion-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch Notion Gallery Data
        run: npm run fetch-notion
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
        continue-on-error: true

      - name: Debug - Check if JSON was generated
        run: ls -la src/data/keizo-gallery.json && cat src/data/keizo-gallery.json | head -20
        continue-on-error: true

      - name: Check if data was updated
        id: check-update
        run: |
          if git diff --quiet -- src/data/keizo-gallery.json; then
            echo "updated=false" >> $GITHUB_OUTPUT
          else
            echo "updated=true" >> $GITHUB_OUTPUT
            git diff -- src/data/keizo-gallery.json
          fi

      - name: Commit and push Notion data
        if: steps.check-update.outputs.updated == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add src/data/keizo-gallery.json
          git commit -m "chore: update keizo-gallery data from Notion [skip ci]"
          git push
        continue-on-error: true

  build:
    needs: fetch-notion-data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          MICROCMS_API_KEY: ${{ secrets.MICROCMS_API_KEY }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: github-pages
          path: ./dist-download
      - name: Extract artifact
        run: |
          cd dist-download
          tar -xf artifact.tar
          mv artifact/* ../dist/ 2>/dev/null || true
      - name: Deploy to FTP
        run: node deploy.js
        env:
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
